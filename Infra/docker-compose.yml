services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  authservice:
    build:
      context: ../AuthService
    container_name: authservice  
    ports:
      - "5001:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=authdb;Username=postgres;Password=postgrespw
      - Jwt__Issuer=AuthService
      - Jwt__Audience=AuthService.Client
      - Jwt__Key=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_WITH_AT_LEAST_32_CHARS
      - Jwt__AccessTokenExpirationMinutes=60
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
