services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  authservice:
    build:
      context: ../AuthService
    container_name: authservice
    ports:
      - "5001:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Services__UserServiceUrl=http://userservice:5000
      - Jwt__Issuer=AuthService
      - Jwt__Audience=AuthService.Client
      - Jwt__Key=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_WITH_AT_LEAST_32_CHARS
      - Jwt__AccessTokenExpirationMinutes=60
    depends_on:
      userservice:
        condition: service_healthy

  userservice:
    build:
      context: ../UserService
    container_name: userservice
    ports:
      - "5002:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=userdb;Username=postgres;Password=postgrespw
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

    roomservice:
    build:
      context: ../RoomService
    container_name: roomservice
    ports:
      - "5003:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=roomdb;Username=postgres;Password=postgrespw
      - Services__UserServiceUrl=http://userservice:5000
      - Services__AuthServiceUrl=http://authservice:5000
      - Jwt__Issuer=AuthService
      - Jwt__Audience=AuthService.Client
      - Jwt__Key=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_WITH_AT_LEAST_32_CHARS
      - Jwt__AccessTokenExpirationMinutes=60
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      userservice:
        condition: service_healthy      

volumes:
  db_data: